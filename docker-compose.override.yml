# Dev overrides — auto-loaded by `docker compose up`.
# Exposes standard ports for host-side servers (API, frontend, worker).
# To skip this file (production): docker compose -f docker-compose.yml up -d

services:
  postgres:
    ports:
      - "127.0.0.1:4432:5432"

  redis:
    ports:
      - "127.0.0.1:4380:6379"

  logto:
    ports:
      - "127.0.0.1:4001:3001"
      - "127.0.0.1:4002:3002"

  # Dev-only: local SMTP (catch-all mail server)
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:4025:1025"
      - "127.0.0.1:4026:8025"

  # Dev-only: local S3 (MinIO)
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:4090:9000"
      - "127.0.0.1:4091:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${BUCKET} &&
      mc anonymous set download local/$${BUCKET}
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      BUCKET: ${S3_BUCKET:-pravko-videos}

volumes:
  minio_data:
